<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evrima RCON Terminal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #30363d;
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header svg {
      width: 18px;
      height: 18px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .category {
      margin-bottom: 16px;
    }

    .category-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #8b949e;
      padding: 4px 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .cmd-btn {
      display: block;
      width: 100%;
      padding: 6px 10px;
      margin-bottom: 2px;
      background: transparent;
      border: none;
      color: #c9d1d9;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      border-radius: 4px;
      font-family: inherit;
    }

    .cmd-btn:hover {
      background: #21262d;
      color: #58a6ff;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow: hidden;
    }

    .connection-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .connection-bar input {
      padding: 8px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      min-width: 120px;
    }

    .connection-bar input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .connection-bar button {
      padding: 8px 16px;
      background: #238636;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
    }

    .connection-bar button:hover {
      background: #2ea043;
    }

  .connection-bar button.danger {
    background: #da3633;
  }

  .connection-bar button.danger:hover {
    background: #f85149;
  }

  .connection-bar button.secondary {
    background: #30363d;
  }

  .connection-bar button.secondary:hover {
    background: #484f58;
  }

  .connection-bar button.ghost {
    background: transparent;
    border: 1px solid #30363d;
    color: #8b949e;
  }

  .connection-bar button.ghost:hover {
    border-color: #f85149;
    color: #f85149;
  }

    .status {
      font-size: 12px;
      color: #8b949e;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f85149;
    }

    .status.connected .status-dot {
      background: #3fb950;
    }

    .terminal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .terminal-title {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .terminal {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 400px;
    }

    .terminal .line {
      margin-bottom: 2px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .terminal .outgoing { color: #d29922; }
    .terminal .response { color: #3fb950; }
    .terminal .error { color: #f85149; }
    .terminal .info { color: #58a6ff; }
    .terminal .timestamp {
      color: #6e7681;
      margin-right: 8px;
    }

    .command-bar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .command-bar input {
      flex: 1;
      padding: 10px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
      font-size: 14px;
    }

    .command-bar input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .command-bar button {
      padding: 10px 20px;
      background: #238636;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
    }

    .command-bar button:hover {
      background: #2ea043;
    }

    .command-bar button:disabled {
      background: #30363d;
      color: #8b949e;
      cursor: not-allowed;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      min-width: 400px;
      max-width: 500px;
    }

    .modal-content h3 {
      margin-bottom: 16px;
      color: #58a6ff;
      font-size: 16px;
      font-weight: 600;
    }

    .modal-field {
      margin-bottom: 12px;
    }

    .modal-field label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #8b949e;
      font-weight: 500;
    }

    .modal-field input {
      width: 100%;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    .modal-field input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-primary {
      padding: 8px 16px;
      background: #238636;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: #2ea043;
    }

    .btn-secondary {
      padding: 8px 16px;
      background: #30363d;
      border: none;
      color: #c9d1d9;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
    }

    .btn-secondary:hover {
      background: #484f58;
    }

    .scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollbar::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .scrollbar::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Commands
    </div>
    <div class="sidebar-content scrollbar" id="commandList"></div>
  </div>

  <div class="main">
    <div class="connection-bar">
      <input type="text" id="host" placeholder="Host / IP">
      <input type="text" id="port" placeholder="RCON Port" value="8888" style="width: 100px;">
      <input type="text" id="password" placeholder="RCON Password" type="password">
      <button id="connectBtn" onclick="connect()">Connect</button>
      <button id="forgetBtn" class="ghost" onclick="forgetConnection()">Forget</button>
      <button id="testBtn" class="secondary" onclick="testConnection()" style="display:none;">Test Connection</button>
      <button id="disconnectBtn" class="danger" onclick="disconnect()" style="display:none;">Disconnect</button>
      <span id="status" class="status"><span class="status-dot"></span>Disconnected</span>
    </div>

    <div class="terminal-header">
      <span class="terminal-title">Terminal Output</span>
      <button class="btn-secondary" onclick="clearTerminal()" style="padding: 4px 12px; font-size: 12px;">Clear</button>
    </div>

    <div class="terminal scrollbar" id="terminal"></div>

    <div class="command-bar">
      <input type="text" id="commandInput" placeholder="Type command..." disabled>
      <button id="sendBtn" onclick="sendCommand()" disabled>Send Command</button>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Command</h3>
      <div id="modalFields"></div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="submitModal()">Send Command</button>
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const COMMANDS = [
      { category: 'Communication', commands: [
        { name: 'announce', args: ['message'], desc: 'Broadcast a message to all players' },
        { name: 'directmessage', args: ['player', 'message'], desc: 'Send a direct message to a player (EOS ID, Steam ID, or Name)' },
        { name: 'toggleglobalchat', args: ['0/1'], desc: 'Disable/Enable global chat' },
      ]},
      { category: 'Moderation', commands: [
        { name: 'ban', args: ['player', 'SteamID64', 'reason', 'duration'], desc: 'Ban a player' },
        { name: 'kick', args: ['player', 'reason'], desc: 'Kick a player' },
        { name: 'slay', args: ['SteamID64'], desc: 'Instantly kill a player\'s dinosaur' },
        { name: 'togglewhitelist', args: [], desc: 'Enable/disable whitelist mode' },
        { name: 'addwhitelist', args: ['playerId'], desc: 'Add player(s) to whitelist' },
        { name: 'removewhitelist', args: ['playerId'], desc: 'Remove player(s) from whitelist' },
      ]},
      { category: 'Info', commands: [
        { name: 'playerlist', args: [], desc: 'List all connected players' },
        { name: 'getplayerdata', args: ['SteamID64?'], desc: 'Get a player\'s class, growth, health, location (omit for all)' },
        { name: 'serverdetails', args: [], desc: 'Show current server configuration' },
        { name: 'getqueuestatus', args: [], desc: 'Show queue status when server is full' },
        { name: 'getplayables', args: [], desc: 'List currently playable species' },
      ]},
      { category: 'Server', commands: [
        { name: 'save', args: ['backupName?'], desc: 'Force a save (optional named backup)' },
        { name: 'pause', args: [], desc: 'Pause/unpause the server' },
        { name: 'custom', args: ['command'], desc: 'Send custom command' },
        { name: 'togglenetupdatedistancechecks', args: ['0/1'], desc: 'Toggle network update distance checks' },
      ]},
      { category: 'World', commands: [
        { name: 'wipecorpses', args: [], desc: 'Remove all corpses from the map' },
        { name: 'toggleai', args: ['0/1'], desc: 'Disable/Enable AI spawns' },
        { name: 'disableaiclasses', args: ['Class1,Class2'], desc: 'Block specific AI species from spawning' },
        { name: 'aidensity', args: ['0.0-1.0'], desc: 'Set AI spawn density' },
        { name: 'toggleailearning', args: ['0/1'], desc: 'Toggle AI learning' },
        { name: 'togglemigrations', args: ['0/1'], desc: 'Toggle migration zones' },
      ]},
      { category: 'Admin', commands: [
        { name: 'updateplayables', args: ['Class:enabled/disabled'], desc: 'Update which species are playable (e.g. Carnotaurus:enabled,Stegosaurus:disabled)' },
        { name: 'togglegrowthmultiplier', args: [], desc: 'Toggle growth on/off without restart' },
        { name: 'setgrowthmultiplier', args: ['value'], desc: 'Change growth speed live (e.g., 2.0)' },
        { name: 'togglehumans', args: ['0/1'], desc: 'Disable/Enable humans' },
      ]},
    ];

    let ws = null;
    let connected = false;
    let currentCommand = null;

    function saveConnection() {
      localStorage.setItem('rcon_host', document.getElementById('host').value);
      localStorage.setItem('rcon_port', document.getElementById('port').value);
      localStorage.setItem('rcon_password', document.getElementById('password').value);
    }

    function loadConnection() {
      const host = localStorage.getItem('rcon_host');
      const port = localStorage.getItem('rcon_port');
      const password = localStorage.getItem('rcon_password');
      if (host) document.getElementById('host').value = host;
      if (port) document.getElementById('port').value = port;
      if (password) document.getElementById('password').value = password;
    }

    function renderCommands() {
      const container = document.getElementById('commandList');
      container.innerHTML = '';
      for (const cat of COMMANDS) {
        const catDiv = document.createElement('div');
        catDiv.className = 'category';
        catDiv.innerHTML = `<div class="category-title">${cat.category}</div>`;
        for (const cmd of cat.commands) {
          const btn = document.createElement('button');
          btn.className = 'cmd-btn';
          btn.textContent = cmd.name;
          btn.title = cmd.desc;
          btn.onclick = () => openCommandModal(cmd);
          catDiv.appendChild(btn);
        }
        container.appendChild(catDiv);
      }
    }

    function openCommandModal(cmd) {
      currentCommand = cmd;
      document.getElementById('modalTitle').textContent = cmd.name;
      const fields = document.getElementById('modalFields');
      fields.innerHTML = '';
      if (cmd.args.length === 0) {
        fields.innerHTML = '<p style="color:#8b949e; font-size:13px;">No arguments required. Click Send Command to execute.</p>';
      } else {
        for (const arg of cmd.args) {
          const div = document.createElement('div');
          div.className = 'modal-field';
          div.innerHTML = `<label>${arg}</label><input type="text" placeholder="${arg}" data-arg="${arg}">`;
          fields.appendChild(div);
        }
      }
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      currentCommand = null;
    }

    function submitModal() {
      if (!currentCommand) return;
      const inputs = document.querySelectorAll('#modalFields input');
      const values = [];
      for (const input of inputs) {
        values.push(input.value);
      }
      const args = values.filter(v => v.trim() !== '').join(',');
      const cmdStr = args ? `${currentCommand.name} ${args}` : currentCommand.name;
      document.getElementById('commandInput').value = cmdStr;
      closeModal();
      sendCommand();
    }

    function connect() {
      const host = document.getElementById('host').value;
      const port = document.getElementById('port').value;
      const password = document.getElementById('password').value;

      if (!host || !port) {
        appendLine('Please enter host and port.', 'error');
        return;
      }

      saveConnection();
      appendLine(`Connecting to ${host}:${port}...`, 'info');

      ws = new WebSocket(`ws://${location.host}`);
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'connect', data: { host, port, password } }));
      };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };
      ws.onclose = () => {
        setConnected(false);
        appendLine('Disconnected from server.', 'error');
      };
      ws.onerror = () => {
        appendLine('Connection error.', 'error');
      };
    }

    function forgetConnection() {
  localStorage.removeItem('rcon_host');
  localStorage.removeItem('rcon_port');
  localStorage.removeItem('rcon_password');
  document.getElementById('host').value = '';
  document.getElementById('port').value = '8888';
  document.getElementById('password').value = '';
  appendLine('Connection details forgotten.', 'info');
}

function testConnection() {
      const host = document.getElementById('host').value;
      const port = document.getElementById('port').value;
      saveConnection();
      appendLine(`Testing connection to ${host}:${port}...`, 'info');
      ws.send(JSON.stringify({ type: 'command', data: { command: 'serverdetails', args: '' } }));
    }

    function disconnect() {
      if (ws) {
        ws.send(JSON.stringify({ type: 'disconnect' }));
        ws.close();
      }
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'connected':
          setConnected(true);
          appendLine(`Connected to ${msg.data}`, 'info');
          break;
        case 'disconnected':
          setConnected(false);
          appendLine(msg.data, 'info');
          break;
        case 'output':
          const cls = msg.data.startsWith('>') ? 'outgoing' : msg.data.includes('ERROR') ? 'error' : 'response';
          appendLine(msg.data, cls);
          break;
        case 'error':
          appendLine(msg.data, 'error');
          break;
      }
    }

    function setConnected(state) {
      connected = state;
      document.getElementById('status').innerHTML = state 
        ? '<span class="status-dot"></span>Connected' 
        : '<span class="status-dot"></span>Disconnected';
      document.getElementById('status').className = 'status' + (state ? ' connected' : '');
      document.getElementById('connectBtn').style.display = state ? 'none' : 'block';
      document.getElementById('testBtn').style.display = state ? 'block' : 'none';
      document.getElementById('disconnectBtn').style.display = state ? 'block' : 'none';
      document.getElementById('commandInput').disabled = !state;
      document.getElementById('sendBtn').disabled = !state;
    }

    function sendCommand() {
      const input = document.getElementById('commandInput');
      const raw = input.value.trim();
      if (!raw || !connected) return;

      const parts = raw.split(' ');
      const command = parts[0];
      const args = parts.slice(1).join(',');

      ws.send(JSON.stringify({ type: 'command', data: { command, args } }));
      input.value = '';
    }

    function appendLine(text, cls = '') {
      const terminal = document.getElementById('terminal');
      const line = document.createElement('div');
      line.className = 'line ' + cls;
      
      const timestamp = document.createElement('span');
      timestamp.className = 'timestamp';
      timestamp.textContent = `[${new Date().toLocaleTimeString()}]`;
      
      line.appendChild(timestamp);
      line.appendChild(document.createTextNode(' ' + text));
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function clearTerminal() {
      document.getElementById('terminal').innerHTML = '';
    }

    document.getElementById('commandInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendCommand();
    });

    loadConnection();
    renderCommands();
  </script>
</body>
</html>
